<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Muhammad Umar Shinwari</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1F2D3D 0%, #2E4057 100%);
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        .wrap { max-width: 560px; }
        .code {
            font-family: 'Lora', serif;
            font-size: 6rem;
            font-weight: 600;
            color: #C9A86A;
            line-height: 1;
            margin-bottom: 1rem;
        }
        h1 {
            font-family: 'Lora', serif;
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        p { color: rgba(255,255,255,0.8); margin-bottom: 2rem; line-height: 1.6; }
        a {
            display: inline-block;
            padding: 0.8rem 1.75rem;
            background: #C9A86A;
            color: #1F2D3D;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            transition: all 0.25s ease;
        }
        a:hover {
            background: #A88949;
            color: #FFFFFF;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="code">404</div>
        <h1>Page Not Found</h1>
        <p>The page you were looking for doesn't exist. Let's head back to the homepage.</p>
        <a href="/">Return Home</a>
    </div>
</body>
</html>
